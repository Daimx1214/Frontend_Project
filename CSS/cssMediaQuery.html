<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
</head>
<style>
    
    .container {
        background-color: gray;
        color: darkmagenta;
        height: 40vh;
    }

    @media screen and (max-width: 1000px) {
        .container{
            background-color: yellow;
            color: black;
        }
    }

    @media screen and (max-width: 600px) {
        .container{
            background-color: blue;
            color: white
        }
    }
</style>
<body>
    <div class="container">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Deleniti facilis vel repellendus soluta perspiciatis, possimus consequatur consectetur repellat, saepe ut illo illum laudantium! Harum accusamus quia atque reprehenderit id quod.
    </div>
    
</body>
</html>

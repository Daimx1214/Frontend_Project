<!-- Task 1: Layout using float -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout with Float</title>
  <style>
    .float-box {
      width: 45%;
      float: left;
      height: 100px;
      margin: 10px;
      background-color: lightblue;
      text-align: center;
      line-height: 100px;
      border: 1px solid black;
    }
    .clearfix::after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>
<body>
  <h2>Float Layout</h2>
  <div class="clearfix">
    <div class="float-box">Div 1</div>
    <div class="float-box">Div 2</div>
  </div>
</body>
</html>



<!-- Task 2: Same Layout using Flexbox -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout with Flexbox</title>
  <style>
    .flex-container {
      display: flex;
      gap: 20px;
    }
    .flex-box {
      width: 45%;
      height: 100px;
      background-color: lightcoral;
      text-align: center;
      line-height: 100px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <h2>Flexbox Layout</h2>
  <div class="flex-container">
    <div class="flex-box">Div 1</div>
    <div class="flex-box">Div 2</div>
  </div>
</body>
</html>



<!-- Task 3: Navigation bar using Flexbox -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Navbar</title>
  <style>
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ddd;
      padding: 10px;
      border: 1px solid black;
    }
    .nav-items {
      display: flex;
      gap: 20px;
    }
    .content {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .box {
      width: 45%;
      height: 100px;
      background-color: lightgreen;
      text-align: center;
      line-height: 100px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div>🔵</div>
    <div class="nav-items">
      <div>Home</div>
      <div>About</div>
      <div>Contact</div>
    </div>
  </div>
  <div class="content">
    <div class="box">Div 1</div>
    <div class="box">Div 2</div>
  </div>
</body>
</html>



<!-- Task 4: Full layout using Flexbox -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Layout with Flexbox</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .header {
      background: url('https://via.placeholder.com/1500x200') no-repeat center/cover;
      color: white;
      padding: 20px;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-items {
      display: flex;
      gap: 15px;
    }
    .logo {
      font-size: 24px;
    }
    .section {
      padding: 20px;
    }
    .cards {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .card {
      width: 30%;
      border: 1px solid black;
      text-align: center;
      padding: 10px;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="navbar">
      <div class="logo">🔵</div>
      <div class="nav-items">
        <div>Home</div>
        <div>About</div>
        <div>Contact</div>
      </div>
    </div>
    <div class="section">
      <h2>Background Image</h2>
    </div>
  </div>
  <div class="cards">
    <div class="card">👤</div>
    <div class="card">👤</div>
    <div class="card">👤</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
        body{
            background-color: rgba(109, 10, 222, 0.491);
            color: red;
            margin: 0;
            padding: 0;
        }
        p.red{
            color: blue;
        }
    </style>
</head>
<body>
    <div>
    <h1>This is CSS Selector Heading</h1>
    <p class="red">Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora, architecto!</p>
    <p class="red">Lorem ipsum dolor sit amet consectetur adipisicing elit</p>
    </div>
</body>
</html>




<!DOCTYPE html>
<html>
<head>
  <title>Margin vs Padding</title>
  <style>
    .box {
      background-color: lightblue;
      color: black;
      margin: 30px;     /* dusre elements se bahar ka space */
      padding: 20px;    /* content ke andar ka space */
      border: 2px solid navy;
    }
  </style>
</head>
<body style="background-color: white">
  
  <div class="box">
    Ye ek box hai jisme margin aur padding dono use ki gayi hai.
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .container{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: lightgray;
        }
        img{
            /* animation-name: identifier;
            animation-duration: 3s;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-iteration-count: 10;
            animation-direction: alternate; */

            animation: identifier 3s ease-in-out 1s infinite alternate;


        }
        /* @keyframes identifier {
            from {
                width: 120px;
                height: 150px;
            }
            to {
                width: 150px;
                height: 200px;
            }
        } */
        @keyframes identifier {
            0% {
                width: 150px;
                height: 200px;
            }
            50% {
                width: 120px;
                height: 150px;
            }
            100% {
                width: 150px;
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
             <img src="https://picsum.photos/200/300" alt="Image">
        </div>
    </div>
    
</body>
</html>

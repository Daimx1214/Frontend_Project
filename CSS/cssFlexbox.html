<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: flex-start;
            background-color: gray;
            height: 100vh;
            /* align-items: center; */
            align-content: center;

        }

        .box1 {
            background-color: red;
            color: aqua;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            order: 1;
            align-self: center;
            /* may be center flex start , flex end */
            flex-shrink:  2;
        }

        .box2 {
            background-color: darkblue;
            color: white;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            order: 0;
            flex-grow: 1;
        }

        .box3 {
            background-color: rgb(0, 8, 6);
            color: white;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            order: 2;
            flex-grow: 1;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1">Box1</div>
        <div class="box2">Box2</div>
        <div class="box3">Box3</div>
    </div>

</body>

</html>

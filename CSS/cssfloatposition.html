<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        .box1{
            background-color: red;
            color: aqua;
            width: 30vw;
            height: 20vw;
            /* clear: both; */
            float: left;
            
        }
        .box2{
            background-color: darkblue;
            color: white;
            width: 30vw;
            height: 20vw;
            float: right;
            /* clear: left; */
        }
    </style>
</head>
<body>
    <div class="box1">BOX1</div>
    <div class="box2">BOX2</div>
    
</body>
</html>

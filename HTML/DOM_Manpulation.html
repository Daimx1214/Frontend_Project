<!DOCTYPE html>
<html>

<head>
  <title>getElementById</title>
</head>
<body>

  <h1 id="heading"> Text & Heading</h1>

  <button onclick="changeColorText()">Change Colour and Text</button>

  <script>
    function changeColorText() {
      var head = document.getElementById("heading")
      head.style.color = "blue";
      head.innerText = "Text and Heading Changed";
    }
  </script>

</body>
</html>

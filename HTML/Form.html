<!DOCTYPE html>
<html>

<head>
  <title>Updated Form</title>
  <Style>
    *{
      font-family: Arial, sans-serif;
    }
    body {
      background-color: #cdb9b9;
      margin: 20px;
    }
    h1 {
      text-align: center;
      color: rgb(255, 0, 140)
    }
    h1:hover {
      color: rgb(0, 0, 0);
    }
    form {
      background-color: #efe6e6;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      border: 2px solid  Black;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }



    
  </Style>
</head>

<body>
  <h1 style>Registration Form</h1>
  <form>

    <label>Username:</label>
    <input type="text" placeholder="Enter your username" required><br><br>

    <label>Password:</label>
    <input type="password" placeholder="Enter password (max: 12) " maxlength="12" required autocomplete="off"><br><br>

    <label>Email:</label>
    <input type="email" placeholder="Enter your email" required><br><br>

    <label>Phone:</label>
    <input type="tel" placeholder="03XX-XXXXXXX" required><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other<br><br>


    <label>Favorite Hobbies:</label><br>
    <input type="checkbox" name="hobby"> Reading<br>
    <input type="checkbox" name="hobby"> Traveling<br>
    <input type="checkbox" name="hobby"> Gaming<br><br>


    <label>Select a Country (only from given):</label><br>
    <select required>
      <option value="">--Select--</option>
      <option value="Pakistan">Pakistan</option>
      <option value="Japan">Japan</option>
      <option value="Turkey">Turkey</option>
    </select><br><br>


    <label>Select or Type a Country:</label>
    <input list="countries" name="countryChoice">
    <datalist id="countries">
      <option value="Pakistan">
      <option value="Japan">
      <option value="Turkey">
    </datalist><br><br>


    <label>Comment:</label><br>
    <textarea placeholder="Enter your comment..." rows="5" cols="35"></textarea><br><br>


    <label>Upload File:</label>
    <input type="file"><br><br>


    <!-- <input type="submit" value="Submit">  -->
    <!-- or -->
    <button type="submit">Submit</button>

  </form>
</body>

</html>
<br><br><br>
<hr color="black" size="3">
<br><br>





<!DOCTYPE html>
<html>

<head>
  <title>Extra Form Elements</title>
</head>

<body>
  <h1 style="color: rgb(254, 0, 102)">Advanced Form</h1>
  <form>

    <label>Volume Level (0 to 100):</label><br>
    <input type="range" min="0" max="100" value="0"><br><br>

    <label>Birthday:</label><br>
    <input type="date"><br><br>

    <label>Appointment Time:</label><br>
    <input type="time"><br><br>

    <label>Favorite Color:</label><br>
    <input type="color"><br><br>

    <label>Website URL:</label><br>
    <input type="url" placeholder="https://example.com"><br><br>


    <label>Search Something:</label><br>
    <input type="search" placeholder="Type to search..."><br><br>

    <label>Select Month:</label><br>
    <input type="month"><br><br>

    <label>Vacation Week:</label><br>
    <input type="week"><br><br>

    <input type="submit" value="Submit">

  </form>
</body>

</html>

<!-- Take a number from user. Check if it’s positive, negative, or zero. -->

<script>
// let num = prompt("Enter a number: "); //num is string
num = Number(num); // convert string to number
if (num > 0) {
  console.log("The number is positive.");
} else if (num < 0) {
  console.log("The number is negative.");
} else {
  console.log("The number is zero.");
}
</script>


<!-- Ask for age. If age < 18 → "Not eligible", else if 18–60 → "Eligible", else → "Senior citizen". -->


<script>
    // let age = prompt("Enter your age")
    age = Number(age);
    if(age < 18){
        console.log("Not eligible");
    }
    else if(age>=18 && age <60){
        console.log("Eligible");
    }
    else{
        console.log("Senior");
    }
</script>

<!-- 5. Take a year. Check if it’s a *leap year* (divisible by 4 but not by 100, except divisible by 400). -->

<script>
    // let year = Number(prompt("Enter Year"));
    if(year % 4 == 0 && year % 100 != 0 || year % 400 == 0){
        console.log("Leap Year");
    }
    else{
        console.log("Not a Leap Year");
    }
</script>

<!-- 6. Input a character. Check if it’s *vowel, consonant, digit, or special character*. -->

<script>
    // let char = prompt("Enter Character: ");

    if (char == 'a' || char == 'e' || char == 'i' || char == 'o' || char == 'u' ||
        char == 'A' || char == 'E' || char == 'I' || char == 'O' || char == 'U') {
        console.log("Vowel");
    }
    else if (char >= '0' && char <= '9') {
        console.log("Digit");
    }
    else if ((char >= 'a' && char <= 'z') || (char >= 'A' && char <= 'Z')) {
        console.log("Consonant");
    }
    else {
        console.log("Special Character");
    }
</script>

<!-- Calculator: take 2 numbers and an operator (+ - * / %). Perform operation. -->

<script>
    // let x = Number(prompt("Enter first number "));
    // let y = Number(prompt("Enter second number "));
    // let operator = prompt("Enter operator (+, -, *, /, %): ");

    switch(operator){
        case '+':
            console.log(x + y);
            break;
        case '-':
            console.log(x - y);
            break;
        case '*':
            console.log(x * y);
            break;
        case '/':
            console.log(x / y);
            break;
        case '%':
            console.log(x % y);
            break;
        default:
            console.log("Invalid Operator");
    }

</script>

 <!-- Menu-driven program:

   * 1 → Area of circle
   * 2 → Area of rectangle
   * 3 → Area of triangle
     (Use switch to decide) -->

<script>
    // let choice = Number(prompt("Enter your choice (1-3): "));

    switch(choice){
    case 1:
        let radius = Number(prompt("Enter radius of circle: "));
        console.log("Area of Circle: " + (3.14 * radius * radius));
        break;
    case 2:
        let length = Number(prompt("Enter length of rectangle: "));   
        let breadth = Number(prompt("Enter breadth of rectangle: "));
        console.log("Area of Rectangle: " + (length * breadth));
        break;
    case 3:
        let base = Number(prompt("Enter base of triangle: "));
        let height = Number(prompt("Enter height of triangle: "));
        console.log("Area of Triangle: " + (0.5 * base * height));
        break;
    } 

</script>

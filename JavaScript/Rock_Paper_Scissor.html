<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="Rock_Paper_Scissor.css">
</head>

<body>
    <h1>Rock Paper Scissor Game</h1>
    <div class="rps">
        <div class="choice" id="rock">
            <img src="./Images/Rock.jpg" alt="Rock">
        </div>
        <div class="choice" id="paper">
            <img src="./Images/Paper.jpg" alt="Paper">
        </div>
        <div class="choice" id="scissor">
            <img src="./Images/Scissor.jpg" alt="Scissor">
        </div>
    </div>

    <div class="scoreboard">
        <div class="Score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="Score">
            <p id="computer-score">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="result">
        <p id="resultMessage">Make your move!</p>
    </div>
    <script src="Rock_Paper_Scissor.js"></script>
</body>

</html>
